name: Bug report
description: Report a reproducible issue in Pomodo.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve Pomodo. Please provide detailed, reproducible information.
  - type: input
    id: extension_version
    attributes:
      label: Extension version
      description: Version shown in Chrome extension details (for example, 1.0.0)
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: chrome_version
    attributes:
      label: Chrome version
      description: Paste from chrome://version
      placeholder: 123.0.x
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - ChromeOS
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce the issue.
      placeholder: |
        1. Open Pomodo settings
        2. Start a focus session
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or recordings
      description: Drag and drop images or videos here if available.
      placeholder: Attach files here.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help diagnosis.
    validations:
      required: false
