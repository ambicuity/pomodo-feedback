name: Update Community Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1'

permissions:
  contents: write

jobs:
  update-hof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate community contributors from issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_OWNER: ambicuity
          SOURCE_REPO: pomodo-feedback
          OUTPUT_FILE: CONTRIBUTORS.md
          MAINTAINER_NAME: Ritesh Rana
          MAINTAINER_EMAIL: contact@riteshrana.engineer
          MAINTAINER_LOGINS: riteshr19
        run: ./scripts/update-community-contributors.sh

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update community contributors'
          file_pattern: CONTRIBUTORS.md
