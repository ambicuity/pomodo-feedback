name: Mirror Feedback Issues To Private Pomodo

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  mirror-to-private:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate sync token
        env:
          SYNC_TOKEN: ${{ secrets.POMODO_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "POMODO_SYNC_TOKEN is required for cross-repo issue sync." >&2
            exit 1
          fi

      - name: Mirror issue to private pomodo
        uses: actions/github-script@v7
        env:
          TARGET_OWNER: ambicuity
          TARGET_REPO: pomodo
          SYNC_LABEL: from-feedback
        with:
          github-token: ${{ secrets.POMODO_SYNC_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.setFailed('No issue payload found.');
              return;
            }

            const author = issue.user?.login || '';
            if (issue.user?.type === 'Bot' || author.endsWith('[bot]')) {
              core.notice(`Skipping bot-authored issue by ${author}.`);
              return;
            }

            const sourceRepo = `${context.repo.owner}/${context.repo.repo}`;
            const body = issue.body || '';
            if (body.includes('<!-- pomodo-sync:mirror-issue=')) {
              core.notice('Issue already contains mirror metadata. Skipping.');
              return;
            }

            const targetOwner = process.env.TARGET_OWNER;
            const targetRepo = process.env.TARGET_REPO;
            const syncLabel = process.env.SYNC_LABEL;

            try {
              await github.rest.issues.getLabel({ owner: targetOwner, repo: targetRepo, name: syncLabel });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: targetOwner,
                  repo: targetRepo,
                  name: syncLabel,
                  color: '0e8a16',
                  description: 'Mirrored from public feedback repository'
                });
              } else {
                throw err;
              }
            }

            const metadata = [
              '',
              '---',
              '<!-- pomodo-sync:source-repo=' + sourceRepo + ' -->',
              '<!-- pomodo-sync:source-issue=' + issue.number + ' -->',
              '<!-- pomodo-sync:source-url=' + issue.html_url + ' -->'
            ].join('\n');

            const mirroredTitle = `[feedback #${issue.number}] ${issue.title}`;
            const mirroredBody = `${body}${metadata}`;

            const created = await github.rest.issues.create({
              owner: targetOwner,
              repo: targetRepo,
              title: mirroredTitle,
              body: mirroredBody,
              labels: [syncLabel]
            });

            const feedbackMetadata = [
              body.trimEnd(),
              '',
              '<!-- pomodo-sync:mirror-repo=' + targetOwner + '/' + targetRepo + ' -->',
              '<!-- pomodo-sync:mirror-issue=' + created.data.number + ' -->'
            ].join('\n');

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: feedbackMetadata
            });

            core.notice(`Mirrored feedback issue #${issue.number} to private issue #${created.data.number}.`);
