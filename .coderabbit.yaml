# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

reviews:
  review_details: true
  path_filters:
    - "**"
    - "!.git/**"
    - "!.github/workflows/*.lock.yml"
    - "!assets/**"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.webp"
    - "!**/*.pdf"
    - "!**/*.zip"
    - "!**/*.lock"
